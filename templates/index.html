<!DOCTYPE html>
<html>

<head>
    <title>HKUST Badminton Status</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.1/socket.io.js"
        integrity="sha512-Z6C1p1NIexPj5MsVUunW4pg7uMX6/TT3CUVldmjXx2kpip1eZcrAnxIusDxyFIikyM9A61zOVNgvLr/TGudOQg=="
        crossorigin="anonymous"></script>
    <script type="text/javascript" charset="utf-8">
        var socket = io.connect('http://' + document.domain + ':' + location.port + '/courtdata', {
            reconnectionAttempts: 20
        });
        socket.on('connect', function () {
            socket.emit('my event', { data: 'I\'m connected!' });
        });
        socket.on('newdata', function (msg) {
            var dataList = document.getElementById('data-list');

            // Remove all list items
            while (dataList.firstChild) {
                dataList.removeChild(dataList.firstChild);
            }

            // Add new list items
            for (var i = 0; i < msg.data.length; i++) {
                var li = document.createElement('li');
                li.textContent = msg.data[i];
                dataList.appendChild(li);
            }

            console.log('Received data: ' + msg.data);
        });
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <style>
        body {
            background-color: #f1f1f1;
            padding: 20px;
        }


        h1 {
            text-align: center;
            margin-top: 20px;
        }

        h2 {
            text-align: center;
        }

        ul#data-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            list-style: none;
            padding: 0;
        }

        ul#data-list li {
            background-color: #fff;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            margin: 10px;
            padding: 10px;
            min-width: 200px;
            max-width: 300px;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1 class="display-4 text-center">HKUST Badminton Status</h1>
        <div class="mt-4">
            <h2 class="h4">Available slots</h2>
            <ul id="data-list">
                <!-- List items will be dynamically added here -->
            </ul>
        </div>
    </div>
</body>

</html>
