name = "fbs-hkust-spider"
main = "ts/main.ts"
compatibility_date = "2024-11-22"
compatibility_flags = ["nodejs_compat"]

[triggers]
crons = ["* 0-14 * * *"]

[[kv_namespaces]]
binding = "hkust_token"
# Replace with your KV namespace IDs once created
id = "e73e6d33bad345538d7b6142c6b0c230"
preview_id = "bed13acf84de498db5695ac4bfcdf7a2"

[[d1_databases]]
binding = "DB"
database_name = "hkust-badminton-slot-data"
# Replace with your actual D1 database ID after creation
database_id = "4cc65080-5400-44de-b74c-661320af9b7e"

[[d1_databases]]
binding = "JIUSHI_DB"
database_name = "jiushi-badminton-slot-data"
# Replace with your actual Jiushi D1 database ID after creation
database_id = "f230462d-bf7f-451b-8c99-ab9e5ea0a73f"

[observability.logs]
enabled = true
head_sampling_rate = 1
invocation_logs = true

[vars]
# Example: PUSHDEER_KEYS = "key1,key2"
USTHING_USER_TYPE = "01"
# Optional: USTHING_UST_ID = "your-ust-id"
# Optional: USTHING_FACILITY_IDS = "2,3,4,5,79,80,100,101"
# Optional: configure inline bearer during local dev
# USTHING_BEARER = "Bearer your-jwt-token"
# Optional: gate /admin/token updates
# TOKEN_ADMIN_SECRET = "change-me"
# Required to enable Jiushi sync
JIUSHI_VENUE_ID = "27"
# Optional: restrict Jiushi grounds
JIUSHI_GROUND_IDS = "151,152,153"
